    name: Currencylayer API
    description: >-
      The Currencylayer REST API exposes six operations covering currency symbol discovery, real-time and historical
      rates, on-demand currency conversion, daily time-frame windows, and change reporting. Authentication is via the
      APILayer `apikey` header on the modern endpoint or the legacy `access_key` query parameter.
