name: Currencylayer Rate Limits
description: |
  Request-rate, concurrency, and quota policies for the Currencylayer API,
  captured against the API Commons Rate Limits 0.1 specification.
url: https://raw.githubusercontent.com/api-evangelist/currencylayer/main/rate-limits/currencylayer-rate-limits.yml
created: '2026-05-29'
modified: '2026-05-29'
specificationVersion: '0.1'
provider: currencylayer
parent: apilayer

scope: per-api-key

quotas:
  - plan: free
    requests: 100
    window: month
    enforcement: hard-stop
    overageAllowed: false
  - plan: basic
    requests: 10000
    window: month
    enforcement: soft-stop
    overageAllowed: true
    overagePricePerRequest: 0.005996
  - plan: professional
    requests: 100000
    window: month
    enforcement: soft-stop
    overageAllowed: true
    overagePricePerRequest: 0.0023996
  - plan: enterprise
    requests: 100000
    window: month
    enforcement: soft-stop
    overageAllowed: true
    overagePricePerRequest: 0.0023996
  - plan: enterprise-plus
    requests: 500000
    window: month
    enforcement: soft-stop
    overageAllowed: true
    overagePricePerRequest: 0.00079992
  - plan: custom
    requests: null
    window: month
    enforcement: negotiated
    overageAllowed: true
    overagePricePerRequest: negotiated

rateLimits:
  perMinute:
    notes: |
      Currencylayer / APILayer do not publish a hard per-minute throttle on the
      marketplace listing. Consumers should expect short-window bursting and
      back off on HTTP 429 / Currencylayer error code 104.
  concurrency:
    notes: |
      Concurrency is not capped per request; rate caps are enforced via the
      monthly quota and the APILayer 429 response.

responsePolicy:
  exceededStatus: 429
  exceededBody:
    success: false
    error:
      code: 104
      type: monthly_usage_limit_reached
      info: Your monthly API request volume has been reached. Please upgrade your Subscription Plan.

freshness:
  free: hourly
  basic: hourly
  professional: 10-minute
  enterprise: 60-second
  enterprise-plus: 60-second
  custom: 60-second

upgradeGuidance:
  - trigger: Sustained 429 / monthly_usage_limit_reached
    action: Upgrade to the next-tier plan or pre-purchase overage credit.
  - trigger: Need sub-10-minute freshness
    action: Move to Enterprise or Enterprise Plus.
  - trigger: Multi-region SLA or volume discount
    action: Move to Custom contract with a dedicated account team.
  - trigger: Need /timeframe endpoint
    action: Upgrade to Enterprise or higher.
  - trigger: Need /change endpoint
    action: Upgrade to Enterprise Plus or Custom.
