aid: currencylayer
name: Currencylayer
description: >-
  Currencylayer is a real-time and historical foreign exchange rate JSON API delivering bank-grade exchange rate data
  for 168 world currencies and precious metals, sourced from 15+ commercial-grade providers. The service is delivered
  through the APILayer marketplace under a freemium subscription model with refresh cadence ranging from hourly on Free
  up to 60 seconds on Enterprise tiers.
