apiVersion: capability.naftiko.dev/v1alpha1
kind: SharedCapability
metadata:
  name: currencylayer-shared
  provider: currencylayer
  parent: apilayer
  description: |
    Shared building blocks for Currencylayer foreign exchange rate operations.
    These per-API primitives are composed by higher-level workflow capabilities
    (currency conversion, treasury reporting, point-in-time lookup, etc.).
spec:
  baseUrl: https://api.apilayer.com/currency_data
  authentication:
    type: apiKey
    in: header
    name: apikey
  operations:
    - id: listCurrencies
      method: GET
      path: /list
      summary: List Supported Currencies
      gating:
        plan: Free
    - id: getLive
      method: GET
      path: /live
      summary: Get Live Exchange Rates
      parameters: [source, currencies]
      gating:
        plan: Free
        notes: |
          Source/base currency is fixed to USD on Free. Basic and above unlock
          arbitrary source currencies. Refresh cadence improves at each paid tier
          (60-min on Free/Basic, 10-min on Professional, 60-sec on Enterprise+).
    - id: getHistorical
      method: GET
      path: /historical
      summary: Get Historical Exchange Rates
      parameters: [date, source, currencies]
      gating:
        plan: Free
    - id: convertCurrency
      method: GET
      path: /convert
      summary: Convert Currency Amount
      parameters: [from, to, amount, date]
      gating:
        plan: Basic
    - id: getTimeFrame
      method: GET
      path: /timeframe
      summary: Get Time-Frame Exchange Rates
      parameters: [start_date, end_date, source, currencies]
      gating:
        plan: Enterprise
    - id: getChange
      method: GET
      path: /change
      summary: Get Currency Change Data
      parameters: [start_date, end_date, source, currencies]
      gating:
        plan: "Enterprise Plus"
  errorEnvelope:
    schema:
      success: false
      error:
        code: integer
        type: string
        info: string
    knownCodes:
      101: Missing or invalid Access Key
      103: Non-existent API Function requested
      104: Monthly request allowance exceeded
      105: Requested function unavailable under current plan
      106: Query returned no results
      404: Requested resource does not exist
